name: Build and Release macOS DMG

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build TaskFlow.dmg
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: TaskFlow
        run: xcodegen generate

      - name: Build Release app
        working-directory: TaskFlow
        run: |
          xcodebuild \
            -project TaskFlow.xcodeproj \
            -scheme TaskFlow \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Compute version
        id: version
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        id: dmg
        working-directory: TaskFlow
        run: |
          APP_PATH="build/Build/Products/Release/TaskFlow.app"
          DMG_NAME="TaskFlow-${{ steps.version.outputs.version }}.dmg"
          STAGING="dmg-staging"

          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "TaskFlow" \
            -srcfolder "$STAGING" \
            -ov \
            -format ULFO \
            "../$DMG_NAME"

          echo "dmg_path=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: TaskFlow ${{ steps.version.outputs.version }}
          body: |
            Automated build from commit ${{ steps.version.outputs.short_sha }} on `main`.

            ### Install
            1. Download `TaskFlow-${{ steps.version.outputs.version }}.dmg` below
            2. Open the DMG and drag **TaskFlow** to your **Applications** folder
            3. On first launch, right-click the app and choose **Open** (the build is unsigned)

            Requires macOS 14 (Sonoma) or later.
          files: TaskFlow-${{ steps.version.outputs.version }}.dmg
          make_latest: "true"
